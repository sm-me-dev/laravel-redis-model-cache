<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="arrowGrayBack" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto-start-reverse">
      <polygon points="10 0, 0 3.5, 10 7" fill="#888"/>
    </marker>
    <marker id="arrowBlueBack" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto-start-reverse">
      <polygon points="10 0, 0 3.5, 10 7" fill="#4A90D9"/>
    </marker>
    <linearGradient id="boxBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBF2FB"/>
      <stop offset="100%" stop-color="#D6E6F5"/>
    </linearGradient>
    <linearGradient id="boxOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF2E9"/>
      <stop offset="100%" stop-color="#FCE4CC"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F8E8"/>
      <stop offset="100%" stop-color="#D0F0D0"/>
    </linearGradient>
    <linearGradient id="boxGray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="boxWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1100" height="900" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#333">High-Level Request Flow</text>

  <!-- ===== LANE LABELS ===== -->
  <!-- Read lane -->
  <rect x="15" y="50" width="70" height="830" rx="6" fill="#4A90D9" fill-opacity="0.06"/>
  <text x="50" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#4A90D9" transform="rotate(-90,50,80)">READ PATH</text>

  <!-- Write lane -->
  <rect x="795" y="50" width="70" height="830" rx="6" fill="#E67E22" fill-opacity="0.06"/>
  <text x="830" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#E67E22" transform="rotate(-90,830,80)">WRITE PATH</text>

  <!-- SWR lane -->
  <rect x="405" y="50" width="70" height="830" rx="6" fill="#27AE60" fill-opacity="0.06"/>
  <text x="440" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#27AE60" transform="rotate(-90,440,80)">SWR / ASYNC</text>

  <!-- ===== APP BOX ===== -->
  <rect x="100" y="60" width="180" height="44" rx="8" fill="#333" filter="url(#shadow)"/>
  <text x="190" y="87" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">Laravel App</text>

  <!-- ===== TRAIT BOX ===== -->
  <rect x="100" y="140" width="180" height="44" rx="8" fill="url(#boxOrange)" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="159" text-anchor="middle" font-size="11" font-weight="600" fill="#D35400">HasRedisModelCache</text>
  <text x="190" y="175" text-anchor="middle" font-size="9" fill="#A04000">saved / deleted events</text>

  <!-- Arrow: App → Trait (write) -->
  <line x1="190" y1="104" x2="190" y2="136" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ===== REDIS MODEL SERVICE ===== -->
  <rect x="100" y="230" width="180" height="60" rx="8" fill="url(#boxWhite)" stroke="#666" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#444">RedisModelService</text>
  <text x="190" y="268" text-anchor="middle" font-size="9" fill="#666">store() / delete()</text>
  <text x="190" y="282" text-anchor="middle" font-size="9" fill="#666">where() / find() / rememberAll()</text>

  <!-- Arrow: Trait → Service (write) -->
  <line x1="190" y1="184" x2="190" y2="226" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ===== INDEXRESOLVER ===== -->
  <rect x="100" y="330" width="180" height="36" rx="6" fill="url(#boxBlue)" stroke="#4A90D9" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="190" y="349" text-anchor="middle" font-size="10" font-weight="600" fill="#2C6FBB">IndexResolver</text>
  <text x="190" y="361" text-anchor="middle" font-size="9" fill="#4A90D9">validates + resolves strategy</text>

  <!-- Arrow: Service → IndexResolver (read) -->
  <line x1="190" y1="290" x2="190" y2="326" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== REDIS BOX ===== -->
  <rect x="100" y="410" width="180" height="80" rx="8" fill="url(#boxGray)" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#555">Redis</text>
  <text x="190" y="450" text-anchor="middle" font-size="9" fill="#666">Hash: HMGET / HGET / HSET</text>
  <text x="190" y="464" text-anchor="middle" font-size="9" fill="#666">Sets: SMEMBERS / SINTER / SADD</text>
  <text x="190" y="478" text-anchor="middle" font-size="9" fill="#666">ZSet: ZRANGEBYSCORE / ZADD</text>

  <!-- Arrow: IndexResolver → Redis -->
  <line x1="190" y1="366" x2="190" y2="406" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== RETURN TO APP (cache hit) ===== -->
  <path d="M 280 440 L 500 440" stroke="#4A90D9" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <text x="390" y="434" text-anchor="middle" font-size="9" fill="#888" font-style="italic">hydrate models → return</text>

  <!-- ===== CACHE MISS / CALLBACK ===== -->
  <rect x="100" y="535" width="180" height="36" rx="6" fill="url(#boxGray)" stroke="#888" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="190" y="554" text-anchor="middle" font-size="10" font-weight="500" fill="#555">Cache callback (DB query)</text>
  <text x="190" y="566" text-anchor="middle" font-size="9" fill="#888">storeMany() → HSET pipeline</text>

  <!-- Arrow: Redis → CacheMissCallback (no cache) -->
  <line x1="190" y1="490" x2="190" y2="531" stroke="#888" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="195" y="516" font-size="9" fill="#888">cache miss</text>

  <!-- Arrow: CacheMissCallback → Redis (store) -->
  <line x1="280" y1="553" x2="350" y2="553" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="315" y="547" text-anchor="middle" font-size="9" fill="#4A90D9">store</text>

  <!-- Arrow back: store results appear in Redis, return to app -->
  <path d="M 350 553 L 350 440 L 280 440" stroke="#4A90D9" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>

  <!-- ===== SWR PATH ===== -->
  <!-- Cache exists but stale + within grace → return stale + dispatch job -->
  <rect x="420" y="230" width="200" height="36" rx="6" fill="url(#boxGreen)" stroke="#27AE60" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="520" y="249" text-anchor="middle" font-size="10" font-weight="600" fill="#1E8449">RevalidateCacheJob</text>
  <text x="520" y="261" text-anchor="middle" font-size="9" fill="#27AE60">dispatched to queue</text>

  <path d="M 280 260 L 380 260 L 380 248 L 416 248" stroke="#27AE60" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="330" y="242" text-anchor="middle" font-size="9" fill="#27AE60">SWR enabled + stale within grace</text>
  <path d="M 380 260 L 380 490 L 285 490" stroke="#27AE60" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <text x="370" y="464" text-anchor="middle" font-size="9" fill="#888" font-style="italic">return stale data</text>

  <!-- SWR job callback → storeMany → Redis -->
  <rect x="420" y="330" width="200" height="50" rx="6" fill="url(#boxGreen)" stroke="#27AE60" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="520" y="350" text-anchor="middle" font-size="10" font-weight="500" fill="#1E8449">Job: execute callback</text>
  <text x="520" y="366" text-anchor="middle" font-size="9" fill="#27AE60">rememberAll(refresh: true)</text>
  <text x="520" y="376" text-anchor="middle" font-size="9" fill="#27AE60">storeMany() → EVALSHA pipeline</text>

  <!-- Arrow: Job box → Redis -->
  <path d="M 520 380 L 520 450 L 285 450" stroke="#27AE60" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="400" y="444" text-anchor="middle" font-size="9" fill="#27AE60">store updated data</text>

  <!-- Arrow: RevalidateCacheJob → Job execution -->
  <line x1="520" y1="266" x2="520" y2="326" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ===== WRITE PATH ===== -->
  <!-- App → Redis directly for writes -->
  <rect x="795" y="230" width="180" height="50" rx="8" fill="url(#boxOrange)" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="885" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#D35400">Redis Write Ops</text>
  <text x="885" y="266" text-anchor="middle" font-size="9" fill="#A04000">HSET / HDEL / SADD / SREM</text>
  <text x="885" y="276" text-anchor="middle" font-size="9" fill="#A04000">ZADD / ZREM / EVALSHA</text>

  <!-- Arrow: Service → Write ops -->
  <line x1="280" y1="255" x2="791" y2="255" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="535" y="248" text-anchor="middle" font-size="9" fill="#E67E22">store() / delete() / updateAttributes()</text>

  <!-- Write ops back: store result -->
  <rect x="795" y="410" width="180" height="44" rx=6 fill="url(#boxOrange)" stroke="#E67E22" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="885" y="433" text-anchor="middle" font-size="10" font-weight="500" fill="#D35400">Invalidation: bustVersion</text>
  <text x="885" y="448" text-anchor="middle" font-size="9" fill="#A04000">touchRedisModelCacheParents</text>

  <line x1="885" y1="280" x2="885" y2="406" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="420" y="570" width="560" height="120" rx="8" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="700" y="592" text-anchor="middle" font-size="12" font-weight="600" fill="#444">Legend</text>

  <rect x="440" y="605" width="14" height="14" rx="3" fill="#4A90D9"/>
  <text x="462" y="616" font-size="10" fill="#555">Read path (cache lookup, hydrate, return)</text>

  <rect x="440" y="627" width="14" height="14" rx="3" fill="#E67E22"/>
  <text x="462" y="638" font-size="10" fill="#555">Write path (store, delete, invalidate)</text>

  <rect x="440" y="649" width="14" height="14" rx="3" fill="#27AE60"/>
  <text x="462" y="660" font-size="10" fill="#555">SWR / Async path (stale serve, background revalidate)</text>

  <rect x="440" y="671" width="14" height="14" rx="3" fill="#DDD"/>
  <text x="462" y="682" font-size="10" fill="#555">Data flow / execution callback</text>
</svg>
