<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSmall" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <rect width="1000" height="850" fill="url(#bgGrad)" rx="8"/>
  <text x="500" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Query Resolution Flow</text>
  <text x="500" y="50" text-anchor="middle" font-size="11" fill="#666">Every query maps to deterministic Redis commands — no SQL fallback, no O(N) hash scans</text>

  <!-- ===== ENTRY METHODS ===== -->
  <!-- find() -->
  <rect x="50" y="70" width="180" height="36" rx="6" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="89" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#2C6FBB">find($id)</text>
  <text x="140" y="101" text-anchor="middle" font-size="9" fill="#666">single model by PK</text>

  <path d="M 230 88 L 310 88" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- O(1) HGET -->
  <rect x="320" y="72" width="200" height="32" rx="6" fill="#FFF" stroke="#4A90D9" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="420" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#4A90D9">Direct HGET → hydrate</text>
  <text x="420" y="104" text-anchor="middle" font-size="9" fill="#888">O(1) — no index needed</text>

  <!-- where() -->
  <rect x="50" y="130" width="180" height="36" rx="6" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="149" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#2C6FBB">where($field = $value)</text>
  <text x="140" y="161" text-anchor="middle" font-size="9" fill="#666">equality condition (AND)</text>

  <path d="M 230 148 L 310 148" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== INDEX RESOLVER ===== -->
  <rect x="320" y="110" width="220" height="42" rx="8" fill="#FFF" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="131" text-anchor="middle" font-size="11" font-weight="600" fill="#D35400">IndexResolver::validate()</text>
  <text x="430" y="146" text-anchor="middle" font-size="9" fill="#888">Checks every field is declared in $indexes</text>

  <!-- Validation failure → exception -->
  <path d="M 540 131 L 610 131" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="620" y="115" width="180" height="32" rx="8" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="710" y="134" text-anchor="middle" font-size="10" font-weight="600" fill="#C0392B">InvalidArgumentException</text>
  <text x="710" y="146" text-anchor="middle" font-size="9" fill="#E74C3C">"Field X is not indexed"</text>

  <!-- Validation passes → strategy decision -->
  <path d="M 430 152 L 430 178" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ===== STRATEGY DECISION ===== -->
  <rect x="320" y="185" width="220" height="36" rx="8" fill="#FDF2E9" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="204" text-anchor="middle" font-size="11" font-weight="600" fill="#D35400">Single field vs multiple?</text>
  <text x="430" y="216" text-anchor="middle" font-size="9" fill="#888">count($where) == 1 → single; else multi</text>

  <!-- Single field branch -->
  <path d="M 320 203 L 260 203 L 260 250 L 320 250" stroke="#4A90D9" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="244" y="230" text-anchor="end" font-size="10" font-weight="600" fill="#4A90D9">1 field</text>

  <rect x="330" y="240" width="200" height="32" rx="6" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="430" y="260" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#2C6FBB">SMEMBERS {key}</text>
  <text x="430" y="272" text-anchor="middle" font-size="9" fill="#888">O(N) — N = set cardinality</text>

  <!-- Multi field branch -->
  <path d="M 540 203 L 600 203 L 600 250 L 534 250" stroke="#E67E22" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="618" y="230" text-anchor="start" font-size="10" font-weight="600" fill="#E67E22">2+ fields</text>

  <rect x="330" y="282" width="200" height="32" rx="6" fill="#FDF2E9" stroke="#E67E22" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="430" y="302" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#D35400">SINTER {k1} {k2} ...</text>
  <text x="430" y="314" text-anchor="middle" font-size="9" fill="#888">O(N1 + N2 + intersection)</text>

  <!-- Both converge to hydrate step -->
  <path d="M 430 272 L 430 340" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M 430 314 L 430 340" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ===== HYDRATION ===== -->
  <rect x="240" y="348" width="300" height="36" rx="8" fill="#FFF" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#1E8449">Batch Hydration</text>
  <text x="390" y="380" text-anchor="middle" font-size="9" fill="#666">HMGET → deserialize → newFromBuilder() → restoreRelations()</text>

  <path d="M 540 366 L 610 366" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Result -->
  <rect x="620" y="350" width="160" height="32" rx="8" fill="#E8F8E8" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#1E8449">Collection<Model></text>

  <!-- ===== WHEREIN ===== -->
  <rect x="50" y="420" width="180" height="36" rx="6" fill="#F0E6F6" stroke="#8E44AD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="439" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#6C3483">whereIn($field, $values)</text>
  <text x="140" y="451" text-anchor="middle" font-size="9" fill="#666">OR logic on one field</text>

  <path d="M 230 438 L 310 438" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Validate + decide -->
  <rect x="320" y="420" width="220" height="36" rx="6" fill="#FFF" stroke="#8E44AD" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <text x="430" y="439" text-anchor="middle" font-size="10" font-weight="600" fill="#6C3483">IndexResolver::resolveWhereIn()</text>
  <text x="430" y="451" text-anchor="middle" font-size="9" fill="#888">1 value → SMEMBERS; 2+ → SUNION</text>

  <path d="M 320 438 L 260 438 L 260 485 L 320 485" stroke="#8E44AD" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <text x="244" y="465" text-anchor="end" font-size="10" font-weight="600" fill="#8E44AD">1 val</text>

  <rect x="330" y="475" width="200" height="30" rx="6" fill="#F0E6F6" stroke="#8E44AD" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="430" y="494" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#6C3483">SMEMBERS {key}</text>

  <path d="M 540 438 L 600 438 L 600 485 L 534 485" stroke="#8E44AD" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <text x="618" y="465" text-anchor="start" font-size="10" font-weight="600" fill="#8E44AD">2+ vals</text>

  <rect x="330" y="515" width="200" height="30" rx="6" fill="#F0E6F6" stroke="#8E44AD" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="430" y="534" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#6C3483">SUNION {k1} {k2} ...</text>

  <path d="M 430 505 L 430 540" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M 430 545 L 430 575" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Both converge to hydrate -->
  <path d="M 430 580 L 390 580 L 390 384" stroke="#27AE60" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- ===== WHEREBETWEEN ===== -->
  <rect x="50" y="600" width="180" height="36" rx="6" fill="#E8F8E8" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="619" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#1E8449">whereBetween($field, $min, $max)</text>
  <text x="140" y="631" text-anchor="middle" font-size="9" fill="#666">range query on sorted field</text>

  <path d="M 230 618 L 310 618" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Validate -->
  <rect x="320" y="600" width="220" height="36" rx="6" fill="#FFF" stroke="#27AE60" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <text x="430" y="619" text-anchor="middle" font-size="10" font-weight="600" fill="#1E8449">Validate $field in $sorted</text>
  <text x="430" y="631" text-anchor="middle" font-size="9" fill="#888">Not found → InvalidArgumentException</text>

  <path d="M 540 618 L 610 618" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="330" y="655" width="200" height="30" rx="6" fill="#E8F8E8" stroke="#27AE60" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="430" y="674" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#1E8449">ZRANGEBYSCORE {key} {min} {max}</text>

  <path d="M 430 685 L 430 720" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- to hydrate -->
  <path d="M 430 720 L 390 720 L 390 384" stroke="#27AE60" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- ===== SELECTIVE / PLUCK ===== -->
  <rect x="50" y="740" width="180" height="36" rx="6" fill="#FDF2E9" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="759" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#D35400">selective() / pluck()</text>
  <text x="140" y="771" text-anchor="middle" font-size="9" fill="#666">lightweight field-only fetch</text>

  <path d="M 230 758 L 310 758" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="320" y="740" width="200" height="36" rx="6" fill="#FFF" stroke="#E67E22" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <text x="420" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#D35400">ID resolution + HMGET</text>
  <text x="420" y="772" text-anchor="middle" font-size="9" fill="#888">No model hydration (60-80% less memory)</text>

  <!-- ===== LEGEND ===== -->
  <rect x="560" y="700" width="380" height="100" rx="8" fill="#FFF" stroke="#DDD" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="750" y="720" text-anchor="middle" font-size="11" font-weight="600" fill="#444">Legend</text>
  <rect x="580" y="732" width="12" height="12" rx="2" fill="#4A90D9"/>
  <text x="600" y="742" font-size="10" fill="#555">where() — single index → SMEMBERS</text>
  <rect x="580" y="752" width="12" height="12" rx="2" fill="#E67E22"/>
  <text x="600" y="762" font-size="10" fill="#555">where() — multi index → SINTER</text>
  <rect x="580" y="772" width="12" height="12" rx="2" fill="#8E44AD"/>
  <text x="600" y="782" font-size="10" fill="#555">whereIn() 2+ values → SUNION</text>
  <rect x="580" y="792" width="12" height="12" rx="2" fill="#27AE60"/>
  <text x="600" y="802" font-size="10" fill="#555">whereBetween() → ZRANGEBYSCORE</text>
</svg>
