name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpstan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-audit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G -c phpstan.neon.dist --error-format=github

      - name: PHPStan debug (show errors)
        if: failure()
        run: |
          echo "=== PHPSTAN VERSION ==="
          vendor/bin/phpstan --version
          echo "=== PHPSTAN ERRORS ==="
          vendor/bin/phpstan analyse --memory-limit=1G -c phpstan.neon.dist --error-format=table 2>&1
          echo "=== BASELINE CHECK ==="
          head -20 phpstan-baseline.neon
