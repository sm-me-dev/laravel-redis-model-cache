name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        stability: ['prefer-lowest', 'prefer-stable']

    name: PHP ${{ matrix.php }} - ${{ matrix.stability }}

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo, redis
          coverage: xdebug
          ini-values: xdebug.mode=coverage

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Run Pint (Code Style Check)
        run: vendor/bin/pint --test

      - name: Run PHP Tests
        run: vendor/bin/phpunit --testdox --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.stability == 'prefer-stable'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Run PHPStan
        if: matrix.php == '8.4'
        run: |
          if [ -f phpstan.neon ]; then
            vendor/bin/phpstan analyse --memory-limit=1G
          else
            echo "No phpstan configuration found, skipping."
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Tests failed! Please check the logs."
