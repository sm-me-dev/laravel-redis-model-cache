name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]


jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        php: [8.3, 8.4]
        laravel: [11, 12, 13]
        prefer: [stable]
        include:
          - php: 8.3
            laravel: 11
            prefer: lowest
          - php: 8.3
            laravel: 12
            prefer: lowest
          - php: 8.3
            laravel: 13
            prefer: lowest

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} (${{ matrix.prefer }})

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis, json, mbstring, pdo, pdo_sqlite
          tools: composer:v2
          coverage: pcov

      - name: Determine Laravel version
        run: |
          if [ "${{ matrix.laravel }}" = "11" ]; then
            echo "LARAVEL_VERSION=^11.0" >> $GITHUB_ENV
            echo "TESTBENCH_VERSION=^9.1.0" >> $GITHUB_ENV
          elif [ "${{ matrix.laravel }}" = "12" ]; then
            echo "LARAVEL_VERSION=^12.0" >> $GITHUB_ENV
            echo "TESTBENCH_VERSION=^10.11" >> $GITHUB_ENV
          else
            echo "LARAVEL_VERSION=^13.0" >> $GITHUB_ENV
            echo "TESTBENCH_VERSION=^11.0" >> $GITHUB_ENV
          fi

      - name: Configure composer for Laravel version
        run: |
          composer require \
            illuminate/console:${{ env.LARAVEL_VERSION }} \
            illuminate/database:${{ env.LARAVEL_VERSION }} \
            illuminate/redis:${{ env.LARAVEL_VERSION }} \
            illuminate/support:${{ env.LARAVEL_VERSION }} \
            orchestra/testbench:${{ env.TESTBENCH_VERSION }} \
            --no-interaction --no-progress --no-update

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/composer
          key: php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ matrix.prefer }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ matrix.prefer }}-
            php-${{ matrix.php }}-

      - name: Install dependencies
        run: |
          composer config policy.advisories.block false
          if [ "${{ matrix.prefer }}" = "lowest" ]; then
            composer update --prefer-lowest --prefer-stable --no-interaction --no-progress
          else
            composer install --no-interaction --no-progress
          fi

      - name: Dependency audit (composer)
        run: composer audit --format=plain
        continue-on-error: true

      - name: Run Pint (code style)
        run: vendor/bin/pint --test

      - name: Run PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run PHPUnit (tests)
        run: vendor/bin/phpunit

      - name: Run PHPUnit with coverage (PHP 8.4 / Laravel 13 / stable only)
        if: matrix.prefer == 'stable' && matrix.laravel == '13' && matrix.php == '8.4'
        run: vendor/bin/phpunit --coverage-clover coverage.xml --coverage-text

      - name: Upload coverage report
        if: matrix.prefer == 'stable' && matrix.laravel == '13' && matrix.php == '8.4'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
