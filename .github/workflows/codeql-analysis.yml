name: "Security Audit"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  audit:
    name: Composer Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-audit

      - name: Run composer audit
        run: composer audit

      - name: Run PHPStan security analysis
        run: vendor/bin/phpstan analyse --memory-limit=1G -c phpstan.neon.dist --no-progress --error-format=table
